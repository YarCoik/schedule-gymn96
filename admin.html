<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка | YarCoik Schedule</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0f1a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #161e2e; padding: 30px; border-radius: 12px; border: 1px solid #2d3748; }
        h1 { color: #3b82f6; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d3748; background: #1e293b; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-save { background: #2563eb; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; }
        .btn-save:hover { background: #3b82f6; }
        .btn-clear { background: #ef4444; font-weight: bold; cursor: pointer; border: none; margin-top: 20px; }
        .btn-clear:hover { background: #f87171; }
        .editor { min-height: 200px; background: #fff; color: #000; padding: 15px; border-radius: 8px; margin: 10px 0; overflow-x: auto; }
        .editor table { border-collapse: collapse; width: 100%; }
        .editor td, .editor th { border: 1px solid #ccc; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ Панель Управления</h1>
    
    <input type="password" id="pass" placeholder="Пароль администратора...">
    <input type="text" id="docTitle" placeholder="Заголовок (например: СРОЧНАЯ ЗАМЕНА)">
    
    <label style="display:block; margin-top:10px; color:#94a3b8;">Скопируй таблицу из Word/Excel и вставь сюда (скрипт сам очистит её от мусора):</label>
    <div id="editor" class="editor" contenteditable="true"></div>
    
    <button onclick="sendData('save')" class="btn-save" id="saveBtn">🚀 ОПУБЛИКОВАТЬ РАСПИСАНИЕ</button>
    <button onclick="sendData('clear')" class="btn-clear" id="clearBtn">🗑 УДАЛИТЬ РУЧНЫЕ ЗАПИСИ</button>
    
    <p id="status" style="text-align: center; font-weight: bold; margin-top: 20px;"></p>
</div>

<script>
    async function sendData(action) {
        const pass = document.getElementById('pass').value;
        const title = document.getElementById('docTitle').value;
        const editorHtml = document.getElementById('editor').innerHTML;
        const status = document.getElementById('status');
        const btnSave = document.getElementById('saveBtn');

        if (!pass) return alert("Бро, нужен пароль!");
        
        let finalHtml = "";
        if (action === 'save') {
            if (!editorHtml.trim()) return alert("Пусто!");

            // 🔥 Стерилизатор Экселя (Убивает весь мусор) 🔥
            const temp = document.createElement('div');
            temp.innerHTML = editorHtml;
            const tables = temp.querySelectorAll('table');
            let cleanHtml = "";

            if (tables.length === 0) return alert("Скрипт не нашел таблицу! Вставь именно таблицу.");

            tables.forEach(t => {
                const cleanTable = document.createElement('table');
                t.querySelectorAll('tr').forEach(row => {
                    const cleanRow = document.createElement('tr');
                    row.querySelectorAll('td, th').forEach(cell => {
                        const cleanCell = document.createElement('td');
                        
                        // Берем только colspan и rowspan, ограничивая их, чтобы не зависло
                        const rs = parseInt(cell.getAttribute('rowspan'));
                        const cs = parseInt(cell.getAttribute('colspan'));
                        if (rs && rs > 1 && rs < 50) cleanCell.setAttribute('rowspan', rs);
                        if (cs && cs > 1 && cs < 50) cleanCell.setAttribute('colspan', cs);
                        
                        // Вытаскиваем только чистый текст, сохраняя переносы строк
                        cleanCell.innerHTML = cell.innerText.trim().replace(/\n/g, '<br>');
                        cleanRow.appendChild(cleanCell);
                    });
                    if (cleanRow.children.length > 0) cleanTable.appendChild(cleanRow);
                });
                cleanHtml += cleanTable.outerHTML;
            });

            finalHtml = `<div class="doc-title" style="color:#ef4444;">🚨 ${title} (Ручное добавление)</div>${cleanHtml}`;
        }

        btnSave.innerText = "⏳ Подключение к серверу...";

        try {
            const response = await fetch('/api/manual', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass, htmlContent: finalHtml, action: action })
            });
            
            const textResponse = await response.text();
            let result;
            try { result = JSON.parse(textResponse); } 
            catch (err) { throw new Error("Сервер упал: " + textResponse.substring(0, 50)); }
            
            if (response.ok && result.success) {
                status.innerText = action === 'save' ? "✅ УСПЕШНО ДОБАВЛЕНО В РАСПИСАНИЕ!" : "✅ РУЧНЫЕ ЗАПИСИ УДАЛЕНЫ!";
                status.style.color = "#22c55e";
                if(action === 'clear') document.getElementById('editor').innerHTML = "";
            } else {
                status.innerText = "❌ Ошибка: " + (result.error || "Неизвестная ошибка сервера");
                status.style.color = "#ef4444";
            }
        } catch (e) {
            status.innerText = "❌ " + e.message;
            status.style.color = "#ef4444";
        }
        
        btnSave.innerText = "🚀 ОПУБЛИКОВАТЬ РАСПИСАНИЕ";
    }
</script>
</body>
</html>
