<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка | YarCoik Schedule</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0f1a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #161e2e; padding: 30px; border-radius: 12px; border: 1px solid #2d3748; }
        h1 { color: #3b82f6; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d3748; background: #1e293b; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-save { background: #2563eb; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; }
        .btn-save:hover { background: #3b82f6; }
        .btn-clear { background: #ef4444; font-weight: bold; cursor: pointer; border: none; margin-top: 20px; }
        .btn-clear:hover { background: #f87171; }
        .editor { min-height: 200px; background: #fff; color: #000; padding: 15px; border-radius: 8px; margin: 10px 0; overflow-x: auto; }
        .editor table { border-collapse: collapse; width: 100%; }
        .editor td { border: 1px solid #ccc; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ Панель Управления</h1>
    
    <input type="password" id="pass" placeholder="Пароль администратора...">
    <input type="text" id="docTitle" placeholder="Заголовок (например: СРОЧНАЯ ЗАМЕНА)">
    
    <label style="display:block; margin-top:10px;">Скопируй таблицу из Word/Excel и вставь сюда:</label>
    <div id="editor" class="editor" contenteditable="true"></div>
    
    <button onclick="sendData('save')" class="btn-save" id="saveBtn">🚀 ДОБАВИТЬ К РАСПИСАНИЮ</button>
    <button onclick="sendData('clear')" class="btn-clear" id="clearBtn">🗑 УДАЛИТЬ РУЧНЫЕ ЗАПИСИ</button>
    
    <p id="status" style="text-align: center; font-weight: bold; margin-top: 20px;"></p>
</div>

<script>
    async function sendData(action) {
        const pass = document.getElementById('pass').value;
        const title = document.getElementById('docTitle').value;
        const editorHtml = document.getElementById('editor').innerHTML;
        const status = document.getElementById('status');

        if (!pass) return alert("Бро, нужен пароль!");
        
        let finalHtml = "";
        if (action === 'save') {
            if (!editorHtml.includes('<table') && !editorHtml.trim()) return alert("Пусто!");
            finalHtml = `<div class="doc-title" style="color:#ef4444;">🚨 ${title} (Ручное добавление)</div>${editorHtml}`;
        }

        try {
            const response = await fetch('/api/manual', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass, htmlContent: finalHtml, action: action })
            });
            const result = await response.json();
            
            if (response.ok) {
                status.innerText = action === 'save' ? "✅ УСПЕШНО ДОБАВЛЕНО!" : "✅ РУЧНЫЕ ЗАПИСИ УДАЛЕНЫ!";
                status.style.color = "#22c55e";
            } else {
                status.innerText = "❌ Ошибка: " + result.error;
                status.style.color = "#ef4444";
            }
       } catch (e) {
            console.error(e); // Выведет ошибку в консоль браузера (F12)
            status.innerText = "❌ Ошибка: Сервер не отвечает или база не подключена!";
            status.style.color = "#ef4444";
        }
    }
</script>

</body>
</html>
