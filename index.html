    <style>
        /* БАЗОВЫЕ ПЕРЕМЕННЫЕ */
        :root {
            color-scheme: light dark;
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a;
            --accent: #2563eb; --border: #e2e8f0; --highlight: #3b82f6;
            --danger: #ef4444; --input-bg: #f1f5f9; --tab-bg: #f1f5f9;

        /* 🌙 ТЁМНАЯ ТЕМА */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
                --accent: #3b82f6; --border: #334155; --highlight: #2563eb; 
                --input-bg: #0f172a; --danger: #f87171; --tab-bg: #0f172a;
            }
        }

        /* ПРИНУДИТЕЛЬНЫЕ ТЕМЫ */
        body.light-mode { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #2563eb; --border: #e2e8f0; --highlight: #3b82f6; --input-bg: #f1f5f9; --tab-bg: #f1f5f9; }
        body.dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; --border: #334155; --highlight: #2563eb; --input-bg: #0f172a; --danger: #f87171; --tab-bg: #0f172a; }
        
        /* 👾 КИБЕРПАНК ТЕМА */
        body.cyber-mode { --bg: #09090b; --card: #18181b; --text: #a78bfa; --accent: #d946ef; --border: #4c1d95; --highlight: #c026d3; --input-bg: #000000; --danger: #f43f5e; --tab-bg: #000000; }
        body.cyber-mode .day-card { box-shadow: 0 0 20px rgba(192, 38, 211, 0.15); border: 1px solid var(--border); }
        body.cyber-mode .tab.active { box-shadow: 0 0 15px rgba(217, 70, 239, 0.5); color: #fff; text-shadow: 0 0 5px #fff; }
        body.cyber-mode .found-cell { background: #701a75 !important; color: #fdf4ff !important; text-shadow: 0 0 5px #e879f9; border-color: #d946ef !important; }

        /* ПЛАВНЫЕ АНИМАЦИИ */
        body, .day-card, .header, .tabs, .tab, .search-box input, .theme-btn, .footer, td, th, .doc-title, .announcement {
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease, text-shadow 0.4s ease;

        body { margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .container { flex-grow: 1; max-width: 1200px; margin: 0 auto; padding: 10px; width: 100%; box-sizing: border-box; overflow-x: hidden; }

        .header { position: sticky; top: 0; z-index: 1000; background: color-mix(in srgb, var(--bg) 85%, transparent); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 15px 0; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        
        .nav { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .tabs { display: inline-flex; background: var(--tab-bg); padding: 4px; border-radius: 12px; border: 1px solid var(--border); }
        .tab { padding: 10px 18px; border: none; background: transparent; color: var(--text); font-weight: 700; cursor: pointer; opacity: 0.6; border-radius: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .tab.active { background: var(--accent); color: white; opacity: 1; box-shadow: 0 4px 12px color-mix(in srgb, var(--accent) 40%, transparent); transform: scale(1); }

        .search-container { display: flex; gap: 8px; flex-grow: 1; justify-content: flex-end; }
        .search-box { width: 100%; max-width: 300px; position: relative; }
        .search-box input { width: 100%; background: var(--card); border: 1px solid var(--border); padding: 12px 16px; border-radius: 10px; color: var(--text); outline: none; box-sizing: border-box; font-size: 14px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }
        
        .theme-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 0 16px; border-radius: 10px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; user-select: none; }

        /* 🔥 ЗАГОЛОВКИ И ОБЪЯВЛЕНИЯ ТЕПЕРЬ ПЕРЕНОСЯТСЯ 🔥 */
        .doc-title { color: var(--accent); font-size: 18px; font-weight: 800; margin: 25px 0 12px 0; padding-bottom: 8px; border-bottom: 2px solid var(--border); letter-spacing: -0.5px; word-wrap: break-word; white-space: normal; }
        .announcement { background: color-mix(in srgb, var(--danger) 10%, transparent); border-left: 4px solid var(--danger); padding: 14px 16px; margin: 15px 0; border-radius: 0 12px 12px 0; font-weight: 600; color: var(--danger); font-size: 15px; line-height: 1.4; word-wrap: break-word; white-space: normal; }
        
        /* Заставляем SPAN внутри заголовков тоже переноситься */
        .doc-title span, .announcement span, .doc-title p, .announcement p { white-space: normal !important; word-wrap: break-word; }

        .day-card { background: var(--card); border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 10px 25px color-mix(in srgb, #000 4%, transparent); }
        
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .table-container::-webkit-scrollbar { display: none; }
        
        table { width: 100% !important; border-collapse: collapse !important; margin: 0 !important; }
        
        /* 🔥 А ВОТ В ТАБЛИЦЕ ЗАПРЕЩАЕМ ПЕРЕНОСЫ 🔥 */
        td, th { border: 1px solid var(--border) !important; padding: 12px 10px !important; font-size: 14px !important; text-align: center !important; vertical-align: top !important; color: var(--text) !important; background: transparent !important; white-space: nowrap !important; }
        td span, th span, td p, th p { white-space: nowrap !important; }

        #content p { margin: 0 !important; padding: 0 !important; background: transparent !important; line-height: 1.5 !important; font-family: inherit !important; min-height: 1.5em !important; }
        #content span { background: transparent !important; font-family: inherit !important; }
        
        .found-cell { background: var(--highlight) !important; font-weight: bold; color: #fff !important; }

        .footer { margin-top: 40px; padding: 30px 20px; text-align: center; font-size: 13px; color: #64748b; border-top: 1px solid var(--border); background: color-mix(in srgb, var(--card) 50%, transparent); line-height: 1.6; }
        .footer p { margin: 5px 0; }
        .footer a { color: var(--accent); text-decoration: none; font-weight: bold; }

        /* 📱 АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ */
        @media (max-width: 600px) { 
            .nav { flex-direction: column; align-items: stretch; }
            .tabs { display: flex; width: 100%; box-sizing: border-box; }
            .tab { flex: 1; text-align: center; padding: 12px 0; }
            .search-container { max-width: none; justify-content: stretch; }
            .search-box { max-width: none; flex-grow: 1; }
        }

<body>

<div class="container">
    <div class="header">
        <div class="nav">
            <div class="tabs">
                <button class="tab" onclick="switchTab('main')">Основное</button>
                <button class="tab active" onclick="switchTab('changes')">Изменения</button>
            </div>
            <div class="search-container">
                <div class="search-box">
                    <input type="search" id="classSearch" placeholder="Твой класс (напр. 9в)..." oninput="applySmartFilter()">
                </div>
                <button id="themeToggle" class="theme-btn" onclick="toggleTheme()" title="Сменить тему"></button>
            </div>
        </div>
    </div>
    <div id="content">
        <div style='padding:40px 20px; text-align:center; color: var(--accent); font-size: 16px; font-weight: bold;'>⏳ Загрузка расписания...</div>
    </div>
</div>

<div class="footer">
    <p>⚠️ Данный сайт является неофициальным проектом и не имеет прямого отношения к администрации МАОУ "Гимназия №96 г. Челябинска".</p>
    <p>Связь с разработчиком: <a href="mailto:yarblox.help@gmail.com">yarblox.help@gmail.com</a></p>
</div>

<script>
    const links = {
        main: "https://docs.google.com/document/d/1wJBD7NMTuwH4XcIiV5UuZmQ-7lyJB66W/export?format=html",
        changes: "https://docs.google.com/document/d/15_GMTlGH7J3LfqoA8PTMOyjrFHb8pAL-/export?format=html"
    };

    let currentTab = 'changes';
    let htmlCache = { main: null, changes: null };
    let isFetching = { main: false, changes: false };

    // УПРАВЛЕНИЕ ТЕМАМИ
    const themes = ['dark', 'light', 'cyber'];
    let currentTheme = localStorage.getItem('yarcoik_theme') || 'dark';
    if (!themes.includes(currentTheme)) currentTheme = 'dark';

    function applyTheme(theme) {
        document.body.classList.remove('light-mode', 'dark-mode', 'cyber-mode');
        document.body.classList.add(`${theme}-mode`);
        const btn = document.getElementById('themeToggle');
        if (theme === 'light') btn.innerText = '☀️';
        else if (theme === 'dark') btn.innerText = '🌙';
        else btn.innerText = '👾'; 
        localStorage.setItem('yarcoik_theme', theme);
    }
    
    function toggleTheme() {
        let idx = themes.indexOf(currentTheme);
        currentTheme = themes[(idx + 1) % themes.length];
        applyTheme(currentTheme);
    }
    applyTheme(currentTheme);

    const savedClass = localStorage.getItem('yarcoik_class');
    if (savedClass) document.getElementById('classSearch').value = savedClass;

    // ЗАГРУЗЧИК (Vercel -> Codetabs -> Corsproxy -> AllOrigins) 
    async function fetchTabData(tab) {
        let autoHtml = "";
        let manualHtml = "";
        const targetUrl = links[tab];

        // Массив всех возможных прокси по приоритету
        const proxyList =[
            `/api/proxy?url=${encodeURIComponent(targetUrl)}`,                         // 1. Личный Vercel (Самый быстрый)
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`, // 2. Codetabs (Работает в РФ без VPN)
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,                  // 3. Corsproxy (Идеально работает С VPN)
            `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`      // 4. Allorigins ( резерв)
        ];

        // Умный цикл: пробуем прокси один за другим
        for (let i = 0; i < proxyList.length; i++) {
            try {
                const response = await fetch(proxyList[i]);
                if (!response.ok) throw new Error('Proxy status bad');
                
                // Allorigins возвращает JSON, остальные отдают чистый текст
                if (proxyList[i].includes('allorigins')) {
                    const data = await response.json();
                    autoHtml = data.contents;
                } else {
                    autoHtml = await response.text();
                }
                
                // Если загрузили реальный HTML с таблицей — прерываем цикл, мы победили!
                if (autoHtml && (autoHtml.includes('<table') || autoHtml.includes('<body'))) {
                    console.log(`✅ Расписание загружено через прокси #${i + 1}`);
                    break;
                }
            } catch (e) {
                console.warn(`⚠️ Прокси #${i + 1} не ответил, переключаюсь на следующий...`);
            }
        }

        if (!autoHtml) {
            throw new Error('Все прокси-сервера заблокированы или недоступны.');
        }

        // 2. РУЧНЫЕ ДОБАВЛЕНИЯ ИЗ БД (Если мы на вкладке "Изменения")
        if (tab === 'changes') {
            try {
                const manualRes = await fetch('/api/manual');
                if (manualRes.ok) manualHtml = await manualRes.text();
            } catch(e) { console.warn("Ручных данных нет"); }
        }
        
        return manualHtml + autoHtml;
    }
    async function loadData(background = false) {
        const tabToLoad = currentTab;
        if (!background) {
            if (htmlCache[tabToLoad]) processAndRender(htmlCache[tabToLoad]);
            else document.getElementById('content').innerHTML = "<div style='padding:40px 20px; text-align:center; color: var(--accent); font-size: 16px; font-weight: bold;'>⏳ Подключение к расписанию школы...</div>";
        }

        if (isFetching[tabToLoad]) return;
        isFetching[tabToLoad] = true;

        try {
            const combinedHtml = await fetchTabData(tabToLoad);
            if (combinedHtml) {
                htmlCache[tabToLoad] = combinedHtml;
                if (currentTab === tabToLoad) processAndRender(combinedHtml);
            }
        } catch (e) {
            if (!htmlCache[tabToLoad]) document.getElementById('content').innerHTML = "<div class='announcement'>Ошибка загрузки. Проверь интернет.</div>";
        } finally {
            isFetching[tabToLoad] = false;
        }
    }

    function processAndRender(htmlString) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlString, 'text/html');
        renderSmartSchedule(doc.body);
    }

    function normalizeTable(table) {
        const rows = Array.from(table.querySelectorAll('tr'));
        const matrix =[];
        rows.forEach((row, rIdx) => {
            if (!matrix[rIdx]) matrix[rIdx] =[];
            let cIdx = 0;
            Array.from(row.children).forEach(cell => {
                let safety = 0;
                while (matrix[rIdx][cIdx] && safety < 100) { cIdx++; safety++; }
                
                const rSpan = Math.min(50, Math.max(1, parseInt(cell.getAttribute('rowspan')) || 1));
                const cSpan = Math.min(50, Math.max(1, parseInt(cell.getAttribute('colspan')) || 1));
                
                cell.removeAttribute('rowspan');
                cell.removeAttribute('colspan');
                cell.setAttribute('data-col', cIdx);
                cell.setAttribute('data-orig-colspan', cSpan); 
                
                matrix[rIdx][cIdx] = cell;
                for (let c = 1; c < cSpan; c++) {
                    const clone = cell.cloneNode(true);
                    clone.setAttribute('data-col', cIdx + c);
                    matrix[rIdx][cIdx + c] = clone;
                }
                for (let r = 1; r < rSpan; r++) {
                    if (!matrix[rIdx + r]) matrix[rIdx + r] =[];
                    const cloneDown = cell.cloneNode(true);
                    cloneDown.setAttribute('data-col', cIdx);
                    matrix[rIdx + r][cIdx] = cloneDown;
                    for (let c = 1; c < cSpan; c++) {
                        const cloneCorner = cell.cloneNode(true);
                        cloneCorner.setAttribute('data-col', cIdx + c);
                        matrix[rIdx + r][cIdx + c] = cloneCorner;
                    }
                }
                cIdx += cSpan;
            });
        });
        
        table.innerHTML = '';
        matrix.forEach(rowArr => {
            const tr = document.createElement('tr');
            rowArr.forEach(item => { if (item instanceof HTMLElement) tr.appendChild(item); });
            table.appendChild(tr);
        });
    }

    function renderSmartSchedule(body) {
        const container = document.getElementById('content');
        container.innerHTML = '';
        
        Array.from(body.children).forEach(el => {
            const tag = el.tagName.toLowerCase();
            const text = el.innerText.trim();
            if (!text) return;

            if (['p', 'div', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6'].includes(tag)) {
                if (text.length > 500 && text.indexOf(' ') === -1) return; 
                const div = document.createElement('div');
                const lowerText = text.toLowerCase();
                if (lowerText.includes('!') || lowerText.includes('уроки по') || lowerText.includes('остальных')) {
                    div.className = 'announcement';
                } else if (lowerText.includes('расписание') || /январ|феврал|март|апрел|ма|июн|июл|август|сентябр|октябр|ноябр|декабр/.test(lowerText) || lowerText.includes('замена')) {
                    div.className = 'doc-title';
                } else { div.className = 'announcement'; }
                div.innerHTML = el.innerHTML;
                container.appendChild(div);
            }
            
            if (tag === 'table' || el.querySelector('table')) {
                const table = tag === 'table' ? el : el.querySelector('table');
                if (table.querySelectorAll('td').length < 6) return; 

                const card = document.createElement('div');
                card.className = 'day-card';
                
                const rows = Array.from(table.querySelectorAll('tr'));
                rows.forEach(row => {
                    const cells = Array.from(row.children);
                    if (cells.length === 1 && parseInt(cells[0].getAttribute('colspan') || 1) > 2) {
                        const rowText = row.innerText.trim();
                        if (rowText.length > 5 && !/\d[а-яa-z]/i.test(rowText)) {
                            const div = document.createElement('div');
                            div.className = 'announcement';
                            div.innerHTML = cells[0].innerHTML;
                            card.appendChild(div);
                            row.remove();
                        }
                    }
                });

                normalizeTable(table); 
                const tContainer = document.createElement('div');
                tContainer.className = 'table-container';
                tContainer.appendChild(table);
                card.appendChild(tContainer);
                container.appendChild(card);
            }
        });

        applySmartFilter();
    }

    function applySmartFilter() {
        const searchInput = document.getElementById('classSearch');
        const inputVal = searchInput.value;
        const query = inputVal.toLowerCase().replace(/\s+/g, '');
        localStorage.setItem('yarcoik_class', inputVal);

        const exactMatchRegex = new RegExp(`(^|[^а-яёa-z0-9])${query}([^а-яёa-z0-9]|$)`, 'i');
        const isClassDeclaration = (text) => /^\s*\d{1,2}\s*[а-яёa-z]\s*(класс)?\s*$/i.test(text);
        
        const cards = document.querySelectorAll('.day-card');
        let anyCardVisible = false;

        cards.forEach(card => {
            const table = card.querySelector('table');
            if (!table) return;

            const rows = Array.from(table.querySelectorAll('tr'));
            let colActive = {}; 
            let visibleDataRows = 0;

            rows.forEach((row, rIdx) => {
                const cells = Array.from(row.children);
                let showRow = false;
                let rowHasTargetContent = false;
                let hasWideCell = false;

                cells.forEach(cell => {
                    const colIdx = parseInt(cell.getAttribute('data-col'));
                    const origColspan = parseInt(cell.getAttribute('data-orig-colspan') || 1);
                    if (origColspan >= 3) hasWideCell = true;

                    const rawText = cell.innerText.toLowerCase();
                    const cleanText = rawText.replace(/\s+/g, '');

                    if (colIdx > 1) {
                        if (query && exactMatchRegex.test(rawText)) {
                            colActive[colIdx] = true; 
                        } else if (isClassDeclaration(rawText)) {
                            colActive[colIdx] = false; 
                        }
                    }

                    if (!query) {
                        cell.style.display = '';
                        cell.classList.remove('found-cell');
                        if (colIdx > 1 && cleanText.length > 0) rowHasTargetContent = true;
                    } else {
                        if (origColspan >= 3 || colIdx <= 1) {
                            cell.style.display = ''; 
                        } else {
                            if (colActive[colIdx]) {
                                cell.style.display = '';
                                if (exactMatchRegex.test(rawText)) cell.classList.add('found-cell');
                                else cell.classList.remove('found-cell');
                                
                                if (cleanText.replace(/[-_.]/g, '').length > 0) {
                                    rowHasTargetContent = true;
                                }
                            } else {
                                cell.style.display = 'none'; 
                            }
                        }
                    }
                });

                if (!query) {
                    showRow = true;
                    visibleDataRows++;
                } else {
                    if (hasWideCell || rowHasTargetContent) {
                        showRow = true;
                        if (rowHasTargetContent) visibleDataRows++;
                    }
                }
                row.style.display = showRow ? '' : 'none';
            });

            if (query && visibleDataRows === 0) {
                card.style.display = 'none';
            } else { 
                card.style.display = ''; 
                anyCardVisible = true;
            }
        });

        let emptyMsg = document.getElementById('empty-search-msg');
        if (query && !anyCardVisible && cards.length > 0) {
            if (!emptyMsg) {
                emptyMsg = document.createElement('div');
                emptyMsg.id = 'empty-search-msg';
                emptyMsg.className = 'announcement';
                emptyMsg.style.textAlign = 'center';
                document.getElementById('content').appendChild(emptyMsg);
            }
            emptyMsg.innerHTML = `Увы, для класса <b>${inputVal}</b> расписания не найдено 🎉`;
        } else if (emptyMsg) {
            emptyMsg.remove();
        }
    }

    function switchTab(tab) {
        if (currentTab === tab) return;
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => {
            t.classList.toggle('active', t.innerText.toLowerCase().includes(tab === 'main' ? 'осн' : 'изм'));
        });
        loadData(false);
    }

    loadData(false);
    setInterval(() => loadData(true), 120000); 
</script>
